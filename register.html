<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - TheraTouch</title>
    <link rel="icon" type="image/jpeg" href="image\OIP.jpg">
  <meta name="description" content="Create your TheraTouch account to start your wellness journey and book therapeutic touch sessions.">
  <script src="tailwind.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            mint: '#059669', /* Rich emerald-mint for clear visibility */
            cyan: '#22D3EE',
            'dark-gray': '#333333',
            white: '#FFFFFF'
          }
        }
      }
    }
  </script>
  
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeInUp 0.8s ease-out;
    }

    /* RTL Support */
    [dir="rtl"] .animated-circle-left {
      left: auto;
      right: 2.5rem;
    }

    [dir="rtl"] .animated-circle-right {
      right: auto;
      left: 2.5rem;
    }

    /* Ensure no horizontal scroll */
    html, body {
      overflow-x: hidden;
      width: 100%;
    }
  </style>
</head>
<body class="font-sans antialiased bg-gradient-to-br from-mint/5 via-white to-cyan/5 dark:from-[#222222] dark:via-[#1a1a1a] dark:to-[#222222] h-screen overflow-hidden flex flex-col transition-colors duration-300">

  <nav class="bg-white/80 dark:bg-[#1a1a1a]/80 backdrop-blur-lg fixed w-full top-0 z-50 shadow-sm border-b border-gray-200 dark:border-white/10 transition-all duration-300">
    <div class="max-w-[1400px] mx-auto nav-container px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">

        <div class="flex-shrink-0">
          <a href="index.html" class="flex items-center space-x-3">
            <div class="flex flex-col">
              <span class="text-2xl font-bold text-dark-gray dark:text-white nav-logo-text">Thera<span class="text-transparent bg-clip-text bg-gradient-to-r from-mint to-cyan">Touch</span></span>
            </div>
          </a>
        </div>

        <div class="flex items-center space-x-2">
          <button id="rtl-toggle" class="nav-icon-button w-10 h-10 rounded-full bg-gray-100 dark:bg-white/10 hover:bg-gray-200 dark:hover:bg-white/20 flex items-center justify-center text-gray-700 dark:text-white transition duration-300 ml-2 text-xs font-semibold" title="Toggle RTL">
            RTL
          </button>

          <button id="theme-toggle" class="nav-icon-button w-10 h-10 rounded-full bg-gray-100 dark:bg-white/10 hover:bg-gray-200 dark:hover:bg-white/20 flex items-center justify-center text-gray-700 dark:text-white transition duration-300 ml-2" title="Toggle Theme">
            <i class="fas fa-moon dark:hidden text-sm"></i>
            <i class="fas fa-sun hidden dark:inline text-sm"></i>
          </button>
        </div>

      </div>
    </div>
  </nav>

  <div class="animated-circle-left absolute top-20 ltr:left-10 rtl:right-10 w-72 h-72 bg-mint/10 rounded-full blur-3xl animate-pulse pointer-events-none"></div>
  <div class="animated-circle-right absolute bottom-20 ltr:right-10 rtl:left-10 w-96 h-96 bg-cyan/10 rounded-full blur-3xl animate-pulse pointer-events-none" style="animation-delay: 1.5s;"></div>

  <div class="flex-1 overflow-y-auto flex items-center justify-center p-4 pt-24">
    <div class="w-full max-w-md">
      
      <div class="bg-white dark:bg-dark-gray rounded-3xl shadow-2xl p-5 border border-gray-100 dark:border-gray-800 animate-fade-in relative z-10">

        <div class="text-center mb-4">
          <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-1">Create Your Account</h2>
          <p class="text-gray-600 dark:text-gray-400 text-xs">Start your wellness journey today</p>
        </div>

        <form class="space-y-3" onsubmit="handleRegister(event)">

          <div>
            <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">First Name</label>
            <input 
              type="text" 
              required
              placeholder="Jane"
              class="w-full px-3 py-2 text-xs rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#222222] dark:text-white focus:border-mint focus:ring-2 focus:ring-mint/20 outline-none transition-all"
            />
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">
              <i class="fas fa-envelope ltr:mr-1 rtl:ml-1 text-mint"></i>Email Address
            </label>
            <input 
              type="email" 
              required
              placeholder="jane.doe@example.com"
              class="w-full px-3 py-2 text-xs rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#222222] dark:text-white focus:border-mint focus:ring-2 focus:ring-mint/20 outline-none transition-all"
            />
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">
              <i class="fas fa-phone ltr:mr-1 rtl:ml-1 text-mint"></i>Phone Number
            </label>
            <input 
              type="tel" 
              required
              placeholder="+91 98765 43210"
              class="w-full px-3 py-2 text-xs rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#222222] dark:text-white focus:border-mint focus:ring-2 focus:ring-mint/20 outline-none transition-all"
            />
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Birth Date</label>
              <input 
                type="date" 
                required
                class="w-full px-3 py-2 text-xs rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#222222] dark:text-white focus:border-mint focus:ring-2 focus:ring-mint/20 outline-none transition-all"
              />
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Gender</label>
              <select 
                required
                class="w-full px-3 py-2 text-xs rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#222222] dark:text-white focus:border-mint focus:ring-2 focus:ring-mint/20 outline-none transition-all"
              >
                <option value="">Select</option>
                <option value="female">Female</option>
                <option value="male">Male</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Password</label>
              <div class="relative">
                <input 
                  type="password" 
                  id="password"
                  required
                  placeholder="Password"
                  class="w-full px-3 py-2 text-xs rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#222222] dark:text-white focus:border-mint focus:ring-2 focus:ring-mint/20 outline-none transition-all ltr:pr-8 rtl:pl-8"
                />
                <button 
                  type="button" 
                  onclick="togglePassword('password', 'toggleIcon1')"
                  class="absolute ltr:right-2 rtl:left-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-mint transition-colors focus:outline-none"
                >
                  <i class="fas fa-eye text-xs" id="toggleIcon1"></i>
                </button>
              </div>
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Confirm</label>
              <div class="relative">
                <input 
                  type="password" 
                  id="confirmPassword"
                  required
                  placeholder="Confirm"
                  class="w-full px-3 py-2 text-xs rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#222222] dark:text-white focus:border-mint focus:ring-2 focus:ring-mint/20 outline-none transition-all ltr:pr-8 rtl:pl-8"
                />
                <button 
                  type="button" 
                  onclick="togglePassword('confirmPassword', 'toggleIcon2')"
                  class="absolute ltr:right-2 rtl:left-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-mint transition-colors focus:outline-none"
                >
                  <i class="fas fa-eye text-xs" id="toggleIcon2"></i>
                </button>
              </div>
            </div>
          </div>

          <div class="flex items-center pt-1">
            <input type="checkbox" required class="w-3.5 h-3.5 rounded border-gray-300 text-mint focus:ring-mint focus:ring-2">
            <span class="ltr:ml-2 rtl:mr-2 text-xs text-gray-600 dark:text-gray-400">
              I agree to the <span class="text-mint font-bold cursor-pointer hover:text-[#047857]">Terms & Conditions</span>
            </span>
          </div>

          <button 
            type="submit"
            class="w-full py-2.5 mt-2 bg-gradient-to-r from-mint to-cyan hover:opacity-90 text-white dark:text-dark-gray font-bold rounded-xl shadow-lg hover:shadow-mint/30 transform hover:-translate-y-0.5 transition-all duration-300 text-sm flex items-center justify-center"
          >
            <i class="fas fa-user-plus ltr:mr-2 rtl:ml-2"></i> <span>Create Account</span>
          </button>

          <div class="relative my-3">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
            </div>
            <div class="relative flex justify-center text-xs">
              <span class="px-2 bg-white dark:bg-dark-gray text-gray-500 dark:text-gray-400">Or sign up with</span>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-2">
            <button 
              type="button"
              class="flex items-center justify-center px-2 py-2 border-2 border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-[#222222] transition-all"
            >
              <svg class="w-4 h-4 ltr:mr-1.5 rtl:ml-1.5" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">Google</span>
            </button>
            <button 
              type="button"
              class="flex items-center justify-center px-2 py-2 border-2 border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-[#222222] transition-all"
            >
              <i class="fab fa-facebook text-blue-600 text-base ltr:mr-1.5 rtl:ml-1.5"></i>
              <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">Facebook</span>
            </button>
          </div>

        </form>

        <div class="mt-4 text-center text-xs text-gray-600 dark:text-gray-400">
          Already have an account? 
          <a href="login.html" class="text-mint font-bold hover:underline transition-colors ltr:ml-1 rtl:mr-1">Sign In</a>
        </div>

      </div>

    </div>
  </div>

  <script>
    // Password Toggle Functionality
    function togglePassword(inputId, iconId) {
      const passwordInput = document.getElementById(inputId);
      const toggleIcon = document.getElementById(iconId);

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    // Form Submission
    function handleRegister(event) {
      event.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }

      const button = event.target.querySelector('button[type="submit"]');
      const icon = button.querySelector('i');
      const span = button.querySelector('span');
      
      icon.className = 'fas fa-spinner fa-spin ltr:mr-2 rtl:ml-2';
      span.innerText = 'Creating Account...';
      button.disabled = true;
      button.classList.add('opacity-80', 'cursor-not-allowed');

      setTimeout(() => {
        alert('Account created successfully! Redirecting to login...');
        window.location.href = 'login.html';
      }, 1500);
    }

    // Theme Toggle Function
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    function toggleTheme() {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
    if (localStorage.getItem('theme') === 'dark') html.classList.add('dark');

    // RTL Toggle Function
    const rtlToggle = document.getElementById('rtl-toggle');

    function toggleRTL() {
      if (html.getAttribute('dir') === 'rtl') {
        html.removeAttribute('dir');
        localStorage.setItem('direction', 'ltr');
      } else {
        html.setAttribute('dir', 'rtl');
        localStorage.setItem('direction', 'rtl');
      }
    }

    if (rtlToggle) rtlToggle.addEventListener('click', toggleRTL);
    if (localStorage.getItem('direction') === 'rtl') html.setAttribute('dir', 'rtl');
  </script>

</body>
</html>
