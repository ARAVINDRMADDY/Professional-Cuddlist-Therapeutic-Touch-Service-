<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - TheraTouch</title>
    <link rel="icon" type="image/jpeg" href="image\OIP.jpg">
  <meta name="description" content="The page you are looking for could not be found. Let TheraTouch guide you back to comfort.">
  <script src="tailwind.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = { 
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            mint: '#059669', /* Rich emerald-mint for clear visibility */
            cyan: '#22D3EE',
            'dark-gray': '#333333',
            white: '#FFFFFF'
          }
        }
      }
    }
  </script>

  <style>
    [dir="rtl"] { direction: rtl; }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeInUp 0.8s ease-out; }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .animate-float { animation: float 4s ease-in-out infinite; }
  </style>
</head>
<body class="font-sans antialiased transition-colors duration-300 bg-white dark:bg-dark-gray flex flex-col min-h-screen">

  <main class="flex-grow flex flex-col">
    <section class="relative flex-grow flex items-center justify-center overflow-hidden bg-gray-50 dark:bg-[#222222] transition-colors duration-300 min-h-screen">
      
      <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-mint/10 rounded-full blur-3xl animate-pulse"></div>
      <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan/10 rounded-full blur-3xl animate-pulse" style="animation-delay: 1.5s;"></div>

      <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center animate-fade-in">
        
        <div class="mb-8 animate-float">
          <div class="w-32 h-32 mx-auto bg-white dark:bg-dark-gray rounded-full flex items-center justify-center shadow-xl border border-gray-100 dark:border-gray-800 text-mint">
            <i class="fas fa-compass text-6xl text-transparent bg-clip-text bg-gradient-to-r from-mint to-cyan"></i>
          </div>
        </div>

        <h1 class="text-8xl md:text-9xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-mint to-cyan mb-4 drop-shadow-sm leading-tight">
          404
        </h1>
        <h2 class="text-3xl md:text-4xl font-bold text-dark-gray dark:text-white mb-6">Oops! You seem to be lost.</h2>
        <p class="text-lg text-gray-600 dark:text-gray-400 mb-10 leading-relaxed max-w-xl mx-auto">
          Take a deep breath. The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's guide you back to comfort.
        </p>
        
        <div class="flex flex-col sm:flex-row justify-center gap-4">
          <a href="index.html" class="inline-flex items-center justify-center px-8 py-3.5 bg-gradient-to-r from-mint to-cyan hover:opacity-90 text-white dark:text-dark-gray rounded-full font-bold transition-all duration-300 shadow-lg transform hover:-translate-y-1">
            <i class="fas fa-home ltr:mr-2 rtl:ml-2"></i> Back to Home
          </a>
          <a href="contact.html" class="inline-flex items-center justify-center px-8 py-3.5 bg-white dark:bg-dark-gray text-dark-gray dark:text-white border border-gray-200 dark:border-gray-700 rounded-full font-semibold transition-all duration-300 shadow-sm hover:bg-gray-100 dark:hover:bg-[#1a1a1a] transform hover:-translate-y-1">
            Contact Support
          </a>
        </div>

      </div>
    </section>
  </main>

  <script>
    // Initialize Theme and RTL from localStorage so the 404 page matches the rest of the site's state
    const html = document.documentElement;
    if (localStorage.getItem('theme') === 'dark') html.classList.add('dark');
    if (localStorage.getItem('direction') === 'rtl') html.setAttribute('dir', 'rtl');
  </script>

</body>
</html>
